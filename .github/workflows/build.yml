name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-14
    env:
      # secrets aren't readable inside step `if:` expressions — hoist a flag.
      HAS_XI_KEY: ${{ secrets.ELEVENLABS_API_KEY != '' }}
    defaults:
      run:
        working-directory: Audio2SRT App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build .app + .dmg
        run: bash build/build_mac.sh
        env:
          PYTHON: python

      - name: Smoke test (CLI + silence cut, no API needed)
        run: |
          BIN="dist/Audio2SRT Studio/Audio2SRT Studio"
          "$BIN" where
          "$BIN" where | grep -q '"ffmpeg": true' || { echo "bundled ffmpeg missing"; exit 1; }
          # tkinter must be inside the bundle (Resolve bridge dialogs).
          # Location varies by Python build: top level or lib-dynload/.
          find "dist/Audio2SRT Studio/_internal" -name "_tkinter*" | grep -q . || { echo "tkinter not bundled"; exit 1; }
          # 6s tone with a silent middle -> detect + cut must work end to end
          ./bin/ffmpeg -y -hide_banner -loglevel error -f lavfi \
            -i "sine=frequency=440:duration=6" \
            -af "volume='if(between(t,2,4),0,1)':eval=frame" /tmp/tone.wav
          "$BIN" detect /tmp/tone.wav --threshold -40dB --min-silence 0.5 | tee /tmp/detect.json
          grep -q '"method": "ffmpeg"' /tmp/detect.json
          "$BIN" silence /tmp/tone.wav --out /tmp/tone_cut.wav | tee /tmp/cut.json
          grep -q '"status": "ok"' /tmp/cut.json
          test -s /tmp/tone_cut.wav

      - name: Live transcription test (runs only if ELEVENLABS_API_KEY secret is set)
        if: env.HAS_XI_KEY == 'true'
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          BIN="dist/Audio2SRT Studio/Audio2SRT Studio"
          ./bin/ffmpeg -y -hide_banner -loglevel error -f lavfi \
            -i "sine=frequency=440:duration=3" /tmp/beep.mp3
          "$BIN" transcribe /tmp/beep.mp3 /tmp/beep.srt 40 2 5 || true
          echo "live API path exercised"

      - uses: actions/upload-artifact@v4
        with:
          name: Audio2SRT-Studio-mac
          path: Audio2SRT App/dist/Audio2SRT-Studio.dmg
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Audio2SRT App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build (PyInstaller onedir)
        shell: cmd
        run: build\build_win.bat

      # cmd + file redirection on purpose: that's exactly how the Resolve Lua
      # bridge invokes the app. PowerShell can't capture stdout of a windowed
      # (GUI-subsystem) exe at all, so pwsh would test the wrong thing.
      - name: Smoke test (CLI + silence cut, no API needed)
        shell: cmd
        run: |
          set "BIN=dist\Audio2SRT Studio\Audio2SRT Studio.exe"
          "%BIN%" where > "%TEMP%\where.json" 2>&1
          type "%TEMP%\where.json"
          findstr /C:"\"ffmpeg\": true" "%TEMP%\where.json" >nul || exit /b 1
          dir /s /b "dist\Audio2SRT Studio\_internal" | findstr /I "_tkinter" >nul || ( echo tkinter not bundled & exit /b 1 )
          "bin\ffmpeg.exe" -y -hide_banner -loglevel error -f lavfi -i "sine=frequency=440:duration=6" -af "volume='if(between(t,2,4),0,1)':eval=frame" "%TEMP%\tone.wav" || exit /b 1
          "%BIN%" detect "%TEMP%\tone.wav" --threshold -40dB --min-silence 0.5 > "%TEMP%\detect.json" 2>&1
          type "%TEMP%\detect.json"
          findstr /C:"\"method\": \"ffmpeg\"" "%TEMP%\detect.json" >nul || ( echo detect failed & exit /b 1 )
          "%BIN%" silence "%TEMP%\tone.wav" --out "%TEMP%\tone_cut.wav" > "%TEMP%\cut.json" 2>&1
          type "%TEMP%\cut.json"
          findstr /C:"\"status\": \"ok\"" "%TEMP%\cut.json" >nul || ( echo silence cut failed & exit /b 1 )
          if not exist "%TEMP%\tone_cut.wav" ( echo no output media & exit /b 1 )
          echo SMOKE OK

      - name: One-click installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" build\installer.iss
          if (-not (Test-Path "dist/Audio2SRT-Studio-Setup.exe")) { throw "installer not produced" }

      - uses: actions/upload-artifact@v4
        with:
          name: Audio2SRT-Studio-windows
          path: Audio2SRT App/dist/Audio2SRT-Studio-Setup.exe
          if-no-files-found: error

  setup-scripts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Extract the :try_python helper verbatim from the shipped setup.bat so
      # this test can never drift from the code users actually run.
      - name: Build detection harness from setup.bat
        shell: pwsh
        run: |
          $lines = Get-Content setup.bat
          $i = ($lines | Select-String -Pattern '^:try_python').LineNumber - 1
          $j = $i; while ($lines[$j] -notmatch 'goto :eof') { $j++ }
          $helper = $lines[$i..$j] -join "`r`n"
          $harness = "@echo off`r`n" +
            "set `"PYTHON_EXE=`"`r`n" +
            "call :try_python %1 %2`r`n" +
            "if defined PYTHON_EXE (echo FOUND=%PYTHON_EXE%) else (echo NOTFOUND)`r`n" +
            "exit /b 0`r`n" + $helper + "`r`n"
          Set-Content -Path "$env:TEMP\harness.bat" -Value $harness -Encoding ascii
          Get-Content "$env:TEMP\harness.bat"

      - name: Detection finds a real interpreter
        shell: cmd
        run: |
          call "%TEMP%\harness.bat" python | findstr /b "FOUND=" || ( echo real python not detected & exit /b 1 )
          echo OK real python detected

      - name: Detection rejects a Store-alias-style stub
        shell: cmd
        run: |
          rem A python.exe that exists on PATH but is not a working interpreter
          rem (this is exactly what the Microsoft Store alias stub looks like
          rem to "where python").
          mkdir "%TEMP%\stub"
          > "%TEMP%\stub\python.exe" echo not a real interpreter
          set "PATH=%TEMP%\stub;%SystemRoot%\System32"
          where python
          call "%TEMP%\harness.bat" python | findstr /b "NOTFOUND" || ( echo stub was wrongly accepted & exit /b 1 )
          echo OK stub rejected

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [mac, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub release with both installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Audio2SRT Studio ${GITHUB_REF_NAME}" \
            --generate-notes \
            Audio2SRT-Studio.dmg Audio2SRT-Studio-Setup.exe
